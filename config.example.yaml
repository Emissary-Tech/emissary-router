server:
  host: 127.0.0.1
  port: 8788

router:
  default: claude-sonnet-4.6
  enabled:
    - claude-sonnet-4.6
    - claude-haiku-4.5
    - gemini-3.1-flash-lite
  policy:
    name: cheap_first
    tau: 0.8
    candidates:
      - gemini-3.1-flash-lite
      - claude-haiku-4.5
      - claude-sonnet-4.6

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  openrouter:
    api_key: ${OPENROUTER_API_KEY}

models:
  claude-sonnet-4.6:
    provider: anthropic
    model_id: claude-sonnet-4-6

  claude-haiku-4.5:
    provider: anthropic
    model_id: claude-haiku-4-5

  # Gemini via OpenRouter (recommended for tool/agent workloads — native Google
  # Gemini 3 is not safe for Claude Code tool loops; see README "Google Native Gemini 3").
  gemini-3.1-flash-lite:
    provider: openrouter
    model_id: google/gemini-3.1-flash-lite

classifier:
  url: https://api.withemissary.com/v1/classification
  api_key: ${ROUTER_KEY}
  model: emissary-model-router-shared
  timeout_seconds: 30

telemetry:
  enabled: true
  log_path: ~/.local/state/router/events.jsonl
  include_classifier_input: false
