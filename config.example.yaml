router:
  api_key: ${EMISSARY_ROUTER_API_KEY}
  router_model: emissary-model-router-shared
  default: claude-sonnet-4.6
  enabled:
    - claude-sonnet-4.6
    - claude-haiku-4.5
    - gemini-3.1-flash-lite
  policy:
    name: cheap_first
    tau: 0.8
    candidates:
      - gemini-3.1-flash-lite
      - claude-haiku-4.5
      - claude-sonnet-4.6

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  openrouter:
    api_key: ${OPENROUTER_API_KEY}

models:
  claude-sonnet-4.6:
    provider: anthropic
    model_id: claude-sonnet-4-6

  claude-haiku-4.5:
    provider: anthropic
    model_id: claude-haiku-4-5

  # Gemini via OpenRouter (recommended for tool/agent workloads — native Google
  # Gemini 3 is not safe for Claude Code tool loops; see README "Google Native Gemini 3").
  gemini-3.1-flash-lite:
    provider: openrouter
    model_id: google/gemini-3.1-flash-lite

telemetry:
  enabled: true
  db_path: ~/.emissary-router/events.sqlite3
  include_classifier_input: false
  # include_raw_event: false   # store a compact debug blob per call (off by default)
  retention_days: 30           # delete events older than this (null = keep all)
  max_events: 50000            # cap total events, oldest dropped first (null = no cap)
  baseline_model: claude-sonnet-4.6   # "what if everything went here" for savings
